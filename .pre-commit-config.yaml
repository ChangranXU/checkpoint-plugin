repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run --locked ruff check --fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff format
        entry: uv run --locked ruff format
        language: system
        types_or: [python, pyi]
      - id: pytest
        name: pytest
        entry: uv run --locked pytest
        language: system
        pass_filenames: false
        always_run: true
